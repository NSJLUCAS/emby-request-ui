services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emby-request-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-emby_request}?schema=public
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-please-change-this-secret-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_CONFIG_SECRET: ${TELEGRAM_CONFIG_SECRET:-please-change-this-secret-in-production}
    ports:
      - "${APP_PORT:-5900}:3000"

  db:
    image: postgres:16-alpine
    container_name: emby-request-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emby_request}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-emby_request}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
